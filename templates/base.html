<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GazeTrack{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111520;
      --border:   #1e2535;
      --accent:   #00e5a0;
      --accent2:  #5b7cfa;
      --danger:   #ff4e6a;
      --warn:     #f5a623;
      --text:     #e4e8f0;
      --muted:    #5a6478;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ─────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 2rem;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
      margin-right: auto;
    }
    .nav-logo span { color: var(--muted); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: color .2s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    nav a.active { border-bottom: 2px solid var(--accent); padding-bottom: 2px; }

    /* ── MAIN ────────────────────────────── */
    main { flex: 1; padding: 2.5rem 2rem; max-width: 1200px; width: 100%; margin: 0 auto; }

    h1 { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
    h2 { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }

    /* ── CARDS ───────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
    }

    /* ── BUTTONS ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .55rem 1.2rem;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 500;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary  { background: var(--accent);  color: #000; }
    .btn-secondary{ background: var(--border);  color: var(--text); }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── BADGE ───────────────────────────── */
    .badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
      font-family: var(--mono);
    }
    .badge-green  { background: #0d2e20; color: var(--accent); }
    .badge-red    { background: #2e1020; color: var(--danger); }
    .badge-blue   { background: #0f1a30; color: var(--accent2); }
    .badge-grey   { background: var(--border); color: var(--muted); }

    /* ── TABLE ───────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .data-table th {
      text-align: left;
      padding: .65rem 1rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .data-table td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,.02); }

    /* ── STAT BOXES ──────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-box { padding: 1.2rem 1.5rem; }
    .stat-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
    .stat-value { font-family: var(--mono); font-size: 2rem; font-weight: 700; color: var(--accent); }

    /* ── PROGRESS BAR ────────────────────── */
    .progress-wrap { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar  { height: 100%; border-radius: 99px; background: var(--accent); transition: width .4s; }

    /* ── FLASH ───────────────────────────── */
    .flash { padding: .75rem 1rem; border-radius: 7px; margin-bottom: 1rem; font-size: .85rem; }
    .flash-success { background: #0d2e20; color: var(--accent); border: 1px solid #1a4e35; }
    .flash-error   { background: #2e1020; color: var(--danger); border: 1px solid #4e1a2a; }

    /* ── DOTS ────────────────────────────── */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-red   { background: var(--danger); }
    .dot-grey  { background: var(--muted); }

    @media (max-width: 640px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      main { padding: 1.5rem 1rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">//gazetrack<span>.py</span></a>
    <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Home</a>
    <a href="/register" {% if request.endpoint=='register_page' %}class="active"{% endif %}>Register</a>
    <a href="/track" {% if request.endpoint=='track_page' %}class="active"{% endif %}>Live Track</a>
    <a href="/dashboard" {% if request.endpoint=='dashboard_page' %}class="active"{% endif %}>Dashboard</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
